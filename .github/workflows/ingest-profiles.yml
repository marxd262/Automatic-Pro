name: Ingest Uploaded Profiles

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'incoming/*.json'
      - 'incoming/**/*.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ingest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ingest:
    if: github.ref_name != 'main' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest uploaded profiles
        run: npm run ingest-profiles

      - name: Validate site build
        run: npm run build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Detect changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain -- incoming public/downloads src/data/releases.json)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit ingestion changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add incoming public/downloads src/data/releases.json
          git commit -m "chore: ingest uploaded profiles"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Create pull request if needed
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_pr="$(gh pr list --head "${GITHUB_REF_NAME}" --base main --json number --jq '.[0].number')"

          if [ -n "${existing_pr}" ]; then
            echo "Pull request #${existing_pr} already exists for ${GITHUB_REF_NAME}."
            exit 0
          fi

          body_file="$(mktemp)"

          cat <<'EOF' > "${body_file}"
          This pull request was created automatically from files uploaded to `incoming/`.

          - validated incoming JSON files
          - copied them into `public/downloads/`
          - updated `src/data/releases.json`
          - cleared `incoming/` after processing
          EOF

          gh pr create \
            --base main \
            --head "${GITHUB_REF_NAME}" \
            --title "Ingest uploaded profiles from ${GITHUB_REF_NAME}" \
            --body-file "${body_file}"
